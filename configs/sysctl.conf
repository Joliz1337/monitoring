# OPTIMIZATION_VERSION=2.1
# =============================================================================
# Universal system optimization for VLESS+Reality VPN
# Tested for: torrents, gaming, 3000+ clients, 1Gbps+
# 
# Key principle: MODERATE limits force kernel to clean up aggressively
# Big limits = tables fill up and stay full = bad
# =============================================================================

# --- Disable IPv6 (optional - comment out if you need IPv6) ---
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# --- BBR + fq (best for throughput + low latency) ---
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq

# =============================================================================
# FILE DESCRIPTORS
# =============================================================================
fs.file-max = 2097152
fs.nr_open = 2097152

# =============================================================================
# CONNTRACK - CRITICAL FOR HIGH CONNECTION COUNT
# =============================================================================
# Max tracked connections
# Each entry ~300 bytes, 1M = ~300MB RAM
net.netfilter.nf_conntrack_max = 1048576

# --- Conntrack timeouts (fast cleanup!) ---
net.netfilter.nf_conntrack_tcp_timeout_syn_sent = 30
net.netfilter.nf_conntrack_tcp_timeout_syn_recv = 30
net.netfilter.nf_conntrack_tcp_timeout_established = 1800
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_last_ack = 30
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close = 10
net.netfilter.nf_conntrack_tcp_timeout_max_retrans = 60
net.netfilter.nf_conntrack_tcp_timeout_unacknowledged = 60
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60
net.netfilter.nf_conntrack_icmp_timeout = 10
net.netfilter.nf_conntrack_generic_timeout = 60

# Allow picking up existing connections
net.netfilter.nf_conntrack_tcp_loose = 1

# =============================================================================
# SOCKET BUFFERS
# =============================================================================
net.core.rmem_default = 262144
net.core.wmem_default = 262144
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608
net.core.optmem_max = 65536

# TCP buffers: min / default / max
net.ipv4.tcp_rmem = 4096 131072 8388608
net.ipv4.tcp_wmem = 4096 65536 8388608

# Let kernel auto-calculate memory limits based on RAM
# DO NOT set tcp_mem/udp_mem manually!

# UDP buffers
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# =============================================================================
# CONNECTION QUEUES
# =============================================================================
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535
net.core.netdev_max_backlog = 65535
net.core.netdev_budget = 50000
net.core.netdev_budget_usecs = 5000

# =============================================================================
# TCP PERFORMANCE
# =============================================================================
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_timestamps = 1
net.ipv4.tcp_sack = 1
net.ipv4.tcp_dsack = 1
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_moderate_rcvbuf = 1
net.ipv4.tcp_no_metrics_save = 1
net.ipv4.tcp_adv_win_scale = 1
net.ipv4.tcp_ecn = 2
net.ipv4.tcp_ecn_fallback = 1
net.ipv4.tcp_frto = 2
net.ipv4.tcp_notsent_lowat = 16384

# =============================================================================
# TCP RETRIES - YOUR WORKING VALUES
# =============================================================================
net.ipv4.tcp_retries1 = 3
net.ipv4.tcp_retries2 = 15
net.ipv4.tcp_syn_retries = 6
net.ipv4.tcp_synack_retries = 5

# =============================================================================
# TIME-WAIT - MODERATE LIMITS FOR AGGRESSIVE CLEANUP
# =============================================================================
# Small limit = kernel aggressively removes old TIME_WAIT sockets
# This is GOOD for VPN with torrents!
net.ipv4.tcp_max_tw_buckets = 65536

# tw_reuse=2 is safer (loopback only)
net.ipv4.tcp_tw_reuse = 2

# Standard port range (no conflicts)
net.ipv4.ip_local_port_range = 32768 60999

# =============================================================================
# ORPHANED CONNECTIONS - MODERATE LIMIT
# =============================================================================
# Small limit = kernel aggressively kills orphan sockets
net.ipv4.tcp_max_orphans = 65536
net.ipv4.tcp_orphan_retries = 3

# =============================================================================
# KEEPALIVE - STANDARD VALUES
# =============================================================================
net.ipv4.tcp_keepalive_time = 7200
net.ipv4.tcp_keepalive_probes = 9
net.ipv4.tcp_keepalive_intvl = 75

# =============================================================================
# FIN TIMEOUT - STANDARD
# =============================================================================
net.ipv4.tcp_fin_timeout = 60

# =============================================================================
# ANTI-DDOS: SYN FLOOD PROTECTION
# =============================================================================
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_rfc1337 = 1
net.ipv4.tcp_abort_on_overflow = 0
net.ipv4.tcp_challenge_ack_limit = 999999999

# =============================================================================
# REVERSE PATH FILTER - LOOSE MODE (CRITICAL FOR VPN!)
# =============================================================================
# 2 = loose mode: accept if ANY route to source exists
# 1 = strict mode: can DROP valid packets with asymmetric routing
# For VPN servers, loose mode (2) is REQUIRED!
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# Don't log martians
net.ipv4.conf.all.log_martians = 0
net.ipv4.conf.default.log_martians = 0

# =============================================================================
# ICMP PROTECTION
# =============================================================================
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
net.ipv4.icmp_echo_ignore_all = 0
net.ipv4.icmp_ratelimit = 1000
net.ipv4.icmp_ratemask = 6168

# =============================================================================
# REDIRECT PROTECTION
# =============================================================================
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# =============================================================================
# ARP CACHE
# =============================================================================
net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh3 = 4096
net.ipv4.neigh.default.gc_stale_time = 60

# ARP announce (for cloud providers)
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.default.arp_announce = 2
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.default.arp_ignore = 1

# =============================================================================
# ROUTING
# =============================================================================
net.ipv4.route.gc_timeout = 100

# =============================================================================
# MEMORY
# =============================================================================
vm.swappiness = 10
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5
vm.panic_on_oom = 0
vm.overcommit_memory = 0
vm.overcommit_ratio = 50

# =============================================================================
# KERNEL
# =============================================================================
kernel.pid_max = 4194304
kernel.panic = 10
