# OPTIMIZATION_VERSION=2.0
# File descriptor and process limits for panel servers
#
# NOTE: These limits must be <= fs.nr_open in sysctl.conf
# Current fs.nr_open = 524288, so these are safe

# All users
* soft nofile 65536
* hard nofile 65536
* soft nproc 32768
* hard nproc 32768
* soft memlock unlimited
* hard memlock unlimited

# Root user (same limits)
root soft nofile 65536
root hard nofile 65536
root soft nproc 32768
root hard nproc 32768
root soft memlock unlimited
root hard memlock unlimited
