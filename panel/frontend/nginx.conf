upstream backend_upstream {
    server backend:8000;
    keepalive 32;
    keepalive_requests 5000;
    keepalive_timeout 75s;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip для статики и JSON
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;

    # Хешированные Vite ассеты — immutable кэш на год
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html — никогда не кэшировать (содержит хеши ассетов)
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE streaming (terminal) — no buffering
    location ~ ^/api/(proxy/\d+/system/execute-stream)$ {
        proxy_pass http://backend_upstream/$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 5s;
        proxy_send_timeout 620s;
        proxy_read_timeout 620s;
    }

    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffer_size 8k;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
    }

    location /health {
        access_log off;
        proxy_pass http://backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
